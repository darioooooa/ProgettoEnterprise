server:
  port: 8443 # porta standard di sviluppo per https
  ssl:
    enabled: true
    key-store: classpath:progettoenterprise.p12
    key-store-password: ${KEYSTORE_PASSWORD}
    key-store-type: PKCS12
    key-alias: progettoenterprise
    key-password: ${KEY_PASSWORD}
    protocol: TLS
    enabled-protocols: TLSv1.2

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: ProgettoEnterprise

  # Configurazioni DB
  datasource:
    url: jdbc:postgresql://localhost:5432/ProgettoEnterprise
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  # Configurazioni JPA
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # Configurazioni delle lingue (i18n)
  messages:
    basename: language/messages
    fallback-to-system-locale: false

  # Configurazioni di sicurezza e keycloak
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/enterprise-realm
          jwk-set-uri: http://localhost:8081/realms/enterprise-realm/protocol/openid-connect/certs

    # Configurazioni Email
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true



# Logging (per il debug di Spring Security)
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security.oauth2: DEBUG
    com.example.progettoenterprise: DEBUG

stripe:
  api:
    key: ${STRIPE_SECRET_KEY}