<div class="login-hero">

  <div class="background-overlay"></div>

  <div class="glass-form-container">
    <div class="form-header">
      <h1>Bentornato</h1>
      <p>Accedi e prenota il tuo prossimo viaggio!</p>
    </div>

    <form (ngSubmit)="eseguiAccesso()" class="booking-form">

      <div *ngIf="messaggioErrore" class="errore-login">
        {{ messaggioErrore }}
      </div>

      <div class="input-group">
        <label for="username">Identificativo Utente</label>
        <input type="text" id="username" name="username"
               [(ngModel)]="datiAccesso.username" required
               placeholder="Inserisci la tua email">
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               [(ngModel)]="datiAccesso.password" required
               placeholder="••••••••">

        <div style="text-align: right; margin-top: 8px;">
          <a (click)="apriModaleRecupero()" style="color: #e2e8f0; font-size: 0.85rem; cursor: pointer; text-decoration: underline;">
            Hai dimenticato la password?
          </a>
        </div>
      </div>

      <button type="submit" class="btn-submit">Inizia l'Avventura</button>

      <div class="login-footer">
        <span>Non hai un account?</span>
        <button type="button" routerLink="/registrazione" class="btn-link-trasparente">
          Registrati
        </button>
      </div>
    </form>
  </div>
</div>

<div class="modale-overlay" *ngIf="modaleRecuperoAperta" (click)="chiudiModaleRecupero()">
  <div class="glass-form-container modale-piccola" (click)="$event.stopPropagation()">

    <div class="modale-header-azione">
      <button class="btn-chiudi-x" (click)="chiudiModaleRecupero()">&times;</button>
    </div>

    <div class="form-header">
      <h2>Recupera Password</h2>
      <p>Inserisci l'indirizzo email associato al tuo account.</p>
    </div>

    <div class="input-group modale-input-spazio">
      <input type="email" placeholder="La tua email..." [(ngModel)]="emailRecupero" class="input-vetro">
    </div>

    <div *ngIf="messaggioConferma" class="messaggio-successo-vetro">
      ✅ Link inviato! Controlla la tua casella di posta.
    </div>

    <button type="button" class="btn-submit" (click)="inviaEmailRecupero()" [disabled]="!emailRecupero || messaggioConferma">
      Invia Link di Recupero
    </button>
  </div>
</div>
