<div class="login-hero">

  <div class="background-overlay"></div>

  <div class="glass-form-container">

    <div style="text-align: left; margin-bottom: 1rem;">
      <a routerLink="/" [style.pointer-events]="isLoading ? 'none' : 'auto'" class="btn-ritorno">
        ← Torna alla pagina iniziale
      </a>
    </div>

    <div class="form-header">
      <h1>Bentornato</h1>
      <p>Accedi e prenota il tuo prossimo viaggio!</p>
    </div>

    <form (ngSubmit)="eseguiAccesso()" class="booking-form">

      <div *ngIf="messaggioErrore" class="errore-login">
        {{ messaggioErrore }}
      </div>

      <div class="input-group">
        <label for="username">Identificativo Utente</label>
        <input type="text" id="username" name="username"
               [(ngModel)]="datiAccesso.username" [disabled]="isLoading" required
               placeholder="Inserisci la tua email">
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               [(ngModel)]="datiAccesso.password" [disabled]="isLoading" required
               placeholder="••••••••">

        <div style="text-align: right; margin-top: 8px;">
          <a (click)="apriModaleRecupero()"
             [style.pointer-events]="isLoading ? 'none' : 'auto'"
             style="color: #e2e8f0; font-size: 0.85rem; cursor: pointer; text-decoration: underline;">
            Hai dimenticato la password?
          </a>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        {{ isLoading ? 'Verifica in corso... ⏳' : "Inizia l'Avventura" }}
      </button>

      <div class="login-footer">
        <span>Non hai un account?</span>
        <button type="button" routerLink="/registrazione" [disabled]="isLoading" class="btn-link-trasparente">
          Registrati
        </button>
      </div>
    </form>
  </div>
</div>

<div class="modale-overlay" *ngIf="modaleRecuperoAperta" (click)="isLoading ? null : chiudiModaleRecupero()">
  <div class="glass-form-container modale-piccola" (click)="$event.stopPropagation()">

    <div class="modale-header-azione">
      <button class="btn-chiudi-x" [disabled]="isLoading" (click)="chiudiModaleRecupero()">&times;</button>
    </div>

    <div class="form-header">
      <h2>Recupera Password</h2>
      <p>Inserisci l'indirizzo email associato al tuo account.</p>
    </div>

    <div class="input-group modale-input-spazio">
      <input type="email" placeholder="La tua email..." [(ngModel)]="emailRecupero" [disabled]="isLoading" class="input-vetro">
    </div>

    <div *ngIf="messaggioConferma" class="messaggio-successo-vetro">
      ✅ Link inviato! Controlla la tua casella di posta.
    </div>

    <button type="button" class="btn-submit" (click)="inviaEmailRecupero()" [disabled]="!emailRecupero || messaggioConferma || isLoading">
      {{ isLoading ? 'Invio in corso...' : 'Invia Link di Recupero' }}
    </button>
  </div>
</div>
