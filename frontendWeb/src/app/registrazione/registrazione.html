<div class="login-hero">
  <div class="background-overlay"></div>

  <div class="glass-form-container">
    <div class="form-header">
      <h1>Crea il tuo profilo</h1>
      <p>Entra a far parte della community dei viaggiatori</p>
    </div>

    <form (ngSubmit)="confermaIscrizione()" class="booking-form">

      <div *ngIf="messaggioDiAvviso" class="errore-login">
        {{ messaggioDiAvviso }}
      </div>
      <div class="input-group">
        <label>Username</label>
        <input type="text" name="username" [(ngModel)]="nuovoUtente.username" [disabled]="isLoading" required placeholder="Es. mariorossi69">
      </div>

      <div class="input-group">
        <label>Nome</label>
        <input type="text" name="nome" [(ngModel)]="nuovoUtente.nome" [disabled]="isLoading" required placeholder="Es. Mario ">
      </div>
      <div class="input-group">
        <label>Cognome</label>
        <input type="text" name="cognome" [(ngModel)]="nuovoUtente.cognome" [disabled]="isLoading" required placeholder="Es. Rossi">
      </div>

      <div class="input-group">
        <label>Indirizzo Email</label>
        <input type="email" name="email" [(ngModel)]="nuovoUtente.email" [disabled]="isLoading" required placeholder="viaggiatore@esempio.it">
      </div>

      <div class="input-group">
        <label>Scegli una Password</label>
        <input type="password" name="password" [(ngModel)]="nuovoUtente.password" [disabled]="isLoading" required placeholder="••••••••">
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading">
        {{ isLoading ? 'Elaborazione iscrizione... ⏳' : 'Registrati e Parti' }}
      </button>

      <div class="registrazione-footer" [style.pointer-events]="isLoading ? 'none' : 'auto'">
        <span>Hai già un account?</span>
        <button type="button" routerLink="/login" [disabled]="isLoading" class="btn-link-trasparente">
          Torna al Login
        </button>
      </div>
    </form>
  </div>
</div>
