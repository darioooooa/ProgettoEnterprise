<div class="page-background">
  <div class="container-richiesta">
    <h2 class="titolo">Nuova Candidatura</h2>
    <p class="sottotitolo">Inserisci i dettagli per diventare Organizzatore</p>

    <div *ngIf="messaggioErrore" class="alert-error">
      <p>{{ messaggioErrore }}</p>
    </div>

    <div class="form-group">
      <label>USERNAME</label>
      <input [(ngModel)]="usernameRichiesto" [disabled]="isLoading" placeholder="Scrivi qui l'username che vorresti usare da organizzatore">
    </div>

    <div class="form-group">
      <label>EMAIL</label>
      <input [(ngModel)]="emailProfessionale" [disabled]="isLoading" placeholder="Scrivi qui l'email professionale">
    </div>

    <div class="form-group">
      <label>PERCHÉ VUOI DIVENTARE ORGANIZZATORE?</label>
      <textarea [(ngModel)]="motivazione" [disabled]="isLoading" placeholder="Scrivi qui la tua motivazione..." rows="3"></textarea>
    </div>

    <div class="form-group">
      <label>BIOGRAFIA PROFESSIONALE</label>
      <textarea [(ngModel)]="biografiaProfessionale" [disabled]="isLoading" placeholder="Descrivi le tue esperienze di viaggio passate..." rows="4"></textarea>
    </div>

    <div class="form-group">
      <label>LINK AI DOCUMENTI (CV, PORTFOLIO)</label>
      <input type="url" [(ngModel)]="documentiLink" [disabled]="isLoading" placeholder="https://il-tuo-sito.com">
    </div>

    <button class="btn-invia" [disabled]="isLoading" (click)="inviaRichiesta()">
      {{ isLoading ? 'INVIO IN CORSO...' : 'INVIA CANDIDATURA' }}
    </button>
  </div>
</div>
